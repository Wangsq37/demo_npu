paths:
  train_input_path: "../TorchEasyRec/data/taobao_data_train/*.parquet"
  eval_input_path: "../TorchEasyRec/data/taobao_data_eval/*.parquet"
  model_dir: "./experiments/multi_tower_din_taobao_local_npu"

runtime:
  device: "auto"
  seed: 2026
  amp: false
  num_workers: 8
  prefetch_factor: 2
  persistent_workers: true
  prefetch_batches: 4
  log_interval: 20
  max_train_steps: null
  max_eval_steps: null

data:
  batch_size: 8192
  read_batch_size: 8192
  sequence_length: 100
  max_train_files: null
  max_eval_files: null
  shuffle_files: true

train:
  num_epochs: 1
  sparse_lr: 0.001
  dense_lr: 0.001
  weight_decay: 0.0

model:
  embedding_dim: 16
  deep_hidden_units: [512, 256, 128]
  din_hidden_units: [256, 64]
  final_hidden_units: [64]
